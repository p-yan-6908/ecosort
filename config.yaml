# EcoSort Configuration - Ontario Waste Classifier

# Model Configuration
model:
  architecture: mobilenet_v3_small
  num_classes: 3  # blue_bin, green_bin, garbage
  dropout: 0.2
  pretrained: true

# Training Configuration
training:
  phase1:
    epochs: 10
    learning_rate: 0.01
    freeze_backbone: true
  phase2:
    epochs: 20
    learning_rate: 0.0001
    scheduler: cosine
  batch_size: 8

# Data Configuration
data:
  image_size: 224
  num_workers: 0

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000

# Paths
paths:
  data_dir: "data"
  models_dir: "models"
  checkpoints_dir: "models/checkpoints"
  logs_dir: "logs"