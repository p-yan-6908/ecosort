# EcoSort Configuration - Ontario Waste Classifier
# Updated after autoresearch experiments

# Model Configuration
model:
  architecture: mobilenet_v3_small
  head_type: eca  # ECA attention - best performing in autoresearch
  num_classes: 6  # All 6 Ontario categories
  dropout: 0.2
  pretrained: true

# Training Configuration
training:
  phase1:
    epochs: 10
    learning_rate: 0.01
    freeze_backbone: true
  phase2:
    epochs: 20
    learning_rate: 0.0001
    scheduler: cosine
  batch_size: 32  # Increased from 8 for better GPU utilization
  label_smoothing: 0.05  # Slight improvement from autoresearch

# Data Configuration
data:
  image_size: 224
  num_workers: 0

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000

# Paths
paths:
  data_dir: "data"
  models_dir: "models"
  checkpoints_dir: "models/checkpoints"
  logs_dir: "logs"
